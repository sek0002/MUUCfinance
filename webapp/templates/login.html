{% extends "base.html" %}

{% block content %}
<section class="login-minimal">
  <form method="post" action="/login" class="login-minimal-form">
    <input
      type="text"
      name="totp_code"
      inputmode="numeric"
      pattern="[0-9]{6}"
      maxlength="6"
      autocomplete="one-time-code"
      placeholder="000000"
      class="{% if login_error %}login-error{% endif %}"
      required
      autofocus
      aria-label="TOTP code"
    >
    <button type="submit" aria-label="Submit TOTP code">></button>
  </form>
</section>
{% endblock %}
